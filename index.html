<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報Ⅰ 進研マーク模試 過去問演習</title>

<style>
:root{
  --bg:#f0f4f8;
  --card:#ffffff;
  --border:#d0dae6;
  --shadow:0 4px 18px rgba(0,0,0,.08);

  --blue:#1a56a0;
  --blue-bg:#e8f0fb;

  --green:#2e7d32;
  --green-bg:#eaf6eb;

  --text:#1e2a3a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:#1a56a0;
  color:white;
  text-align:center;
  padding:24px;
}

header h1{
  font-size:1.5rem;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

.year-section{
  background:white;
  border-radius:12px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
  overflow:hidden;
}

.year-title{
  color:white;
  padding:14px 20px;
  font-size:1.2rem;
  font-weight:bold;
}

.year2025 .year-title{
  background:var(--blue);
}

.year2024 .year-title{
  background:var(--green);
}

.month-block{
  padding:20px;
  border-top:1px solid var(--border);
}

.month-title{
  font-size:1.05rem;
  font-weight:bold;
  margin-bottom:14px;
}

.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.menu a{
  display:block;
  text-decoration:none;
  padding:16px;
  border-radius:10px;
  border:2px solid var(--border);
  color:var(--text);
  transition:.2s;
}

.year2025 .menu a:hover{
  background:var(--blue-bg);
  border-color:var(--blue);
}

.year2024 .menu a:hover{
  background:var(--green-bg);
  border-color:var(--green);
}

.qtitle{
  font-weight:bold;
  margin-bottom:4px;
}

.qdesc{
  font-size:0.85rem;
  color:#666;
}

.coming{
  color:#888;
  font-style:italic;
  padding:8px 0;
}

@media(max-width:600px){
  .menu{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>情報Ⅰ 進研マーク模試 過去問演習</h1>
</header>

<main>

        </a>

        <a href="202506_第2問.html">

        </a>

        <a href="202506_第3問.html">
          <div class="qtitle">第3問</div>
          <div class="qdesc">プログラミング</div>
        </a>

        <a href="202506_第4問.html">
          <div class="qtitle">第4問</div>
          <div class="qdesc">データの活用</div>
        </a>
      </div>
    </div>

    <div class="month-block">
      <div class="month-title">2025年9月</div>
      <div class="coming">（追加予定）</div>
    </div>

    <div class="month-block">

    </div>

  </section>

  <!-- 2024年度 -->
  <section class="year-section year2024">

    <div class="year-title">2024年度</div>

    <div class="month-block">
      <div class="month-title">2024年6月</div>

      <div class="menu">
        <a href="202406_第1問.html">
          <div class="qtitle">第1問</div>
          <div class="qdesc">情報・ICT活用</div>
        </a>

        <a href="202406_第2問.html">
          <div class="qtitle">第2問</div>
          <div class="qdesc">知的財産・音声データ</div>
        </a>

        <a href="202406_第3問.html">
          <div class="qtitle">第3問</div>

        <a href="202406_第4問.html">

      </div>
    </div>

    <div class="month-block">
      <div class="month-title">2024年9月</div>
      <div class="coming">（追加予定）</div>
    </div>

    <div class="month-block">
      <div class="month-title">2024年11月</div>
      <div class="coming">（追加予定）</div>
    </div>

  </section>

</main>

</body>
</html>
